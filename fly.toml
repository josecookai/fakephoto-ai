# Fly.io deployment configuration
# https://fly.io

app = "fakephoto-ai"
primary_region = "iad"  # Washington, D.C.

[build]
  dockerfile = "Dockerfile"
  build-target = "production"

[env]
  ENVIRONMENT = "production"
  PORT = "8080"
  WORKERS = "4"

[[services]]
  internal_port = 8080
  protocol = "tcp"
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  
  [[services.ports]]
    handlers = ["http"]
    port = 80
    force_https = true
  
  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443
  
  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20
  
  [[services.http_checks]]
    interval = "10s"
    timeout = "2s"
    grace_period = "5s"
    method = "GET"
    path = "/health"
    protocol = "http"
    tls_skip_verify = false

[[vm]]
  size = "shared-cpu-2x"
  memory = "2gb"

[mounts]
  source = "fakephoto_uploads"
  destination = "/app/uploads"

# Scaling configuration
[deploy]
  strategy = "rolling"
  max_unavailable = 0

# Secrets (set via `fly secrets set`)
# fly secrets set OPENAI_API_KEY=xxx GOOGLE_API_KEY=xxx ANTHROPIC_API_KEY=xxx