# Railway deployment configuration
# https://railway.app

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    envs:
      - OPENAI_API_KEY
      - GOOGLE_API_KEY
      - ANTHROPIC_API_KEY
      - ENVIRONMENT=production
      - PORT=8000
    healthcheck:
      path: /health
      port: 8000
    resources:
      cpu: 2
      memory: 4G
    volumes:
      - uploads:/app/uploads