# Render.com deployment configuration
# https://render.com

services:
  # Python Backend API
  - type: web
    name: fakephoto-api
    runtime: docker
    repo: https://github.com/josecookai/fakephoto-ai
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: PORT
        value: 8000
      - key: WORKERS
        value: 4
      - key: PYTHONUNBUFFERED
        value: "1"
    healthCheckPath: /health
    healthCheckPort: 8000
    autoDeploy: true
    plan: standard
    numInstances: 1
    disk:
      name: uploads
      mountPath: /app/uploads
      sizeGB: 5

  # Optional: Background Worker for batch processing
  - type: worker
    name: fakephoto-worker
    runtime: docker
    repo: https://github.com/josecookai/fakephoto-ai
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: fakephoto-redis
          property: connectionString
    plan: starter

  # Redis for caching and job queue
  - type: redis
    name: fakephoto-redis
    plan: free
    maxmemoryPolicy: allkeys-lru